<!DOCTYPE html>

<html>

<head>

	<!-------------Meta Tags------------------->
	<meta charset="UTF-8">
	
	<meta name="description"
		content="Medicare Hospital Website">
		
	<meta name="author"
		content="Yash">
	
	<meta name="viewport"	content="width=device-width, initial-scale=1.0">
	
	<!-------------Favicon---------------------------->
	<link rel="icon" href="Medicare Image.png">

	<!-----------------------External Css Link--------------------------->
	<link rel="stylesheet"	href="Medicare.css">
	
	<!------------------Website Title----------------->
	<title>Appointment Page</title>
	
</head>

<body>

	<!---------------------Header Section---------------------->

<header>

<section class="appointment">

	<h1>Book Appointment</h1>
	
</section>

</header>

<section class="form">
	
	<p>

		Fill out the form below to schedule an appointment with our experienced healthcare professionals.

	</p>

<form>

	<label>Full Name</label>
	
		<input type="text" required>
		
	<br>
	<br>
	
	<label>Age</label>
	
		<input type="number">
		
	<br>
	<br>
	
	<label>Gender</label>
	
		<input type="radio"
			name="Gender"
			value="Male">Male
			
		<input type="radio"
			name="Gender"
			value="Female">Female
			
	<br>
	<br>
	
	<label>Mobile Number</label>
	
		<input type="tel" required>
		
	<br>
	<br>
	
	<label>Email</label>
	
		<input type="email"required>
		
	<br>
	<br>
	
	<label>Address</label>
	
		<textarea></textarea>
		
	<br>
	<br>
	
	<label>Department</label>
	
	<select>
	
		<option>Cardiology</option>
		
		<option>Neurology</option>
		
		<option>Orthopedics</option>

		<option>Gynecology</option>
		
		<option>Pediatrician</option>
	
		<option>ENT</option>
		
		<option>Dermatology</option>

		<option>General Medicine</option>
		
	</select>
	
	<br>
	<br>
	
	<label>Doctor</label>
	
	<select required>
	
		<option>Dr. Rajesh Sharma</option>

		<option>Dr. Priya Verma</option>
		
		<option>Dr. Amit Patel</option>
		
		<option>Dr. Neha Jain</option>
		
		<option>Dr. Sandeep Gupta</option>
		
		<option>Dr. Vikram Singh</option>
		
		<option>Dr. Pooja Mehta</option>
		
		<option>Dr. Anil Sharma</option>
		
	</select>
	
	<br>
	
	<br>
	
	<label>Appointment Date</label>
	
		<input type="date" required>
		
	<br>
	<br>
	
	<label>Appointment Time</label>
	
		<input type="time" required>
		
	<br>
	<br>
	
	<label>Problem Description</label>
	
		<textarea required></textarea>
		
	<br>
	<br>
	
	<label>Upload Medical Report</label>
	
		<input type="file">
		
	<br>
	<br>
	
	<input type="submit"
		value="Submit">
		
	<input type="reset"
		value="Reset">
		
</form>

</section>

</body>

</html>
